<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSPI Market Dashboard - 실시간 증시 요약</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <h1 class="title">KOSPI MARKET DASHBOARD</h1>
            <p class="subtitle">실시간 글로벌 시장 지표 및 코스피 분석</p>
        </div>
        <div class="market-status">
            <span class="status-dot pulse"></span>
            <span id="market-time">MARKET OPEN</span>
        </div>
    </header>

    <main class="dashboard-grid">
        <!-- 1. KOSPI Index -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI INDEX (코스피)</h2>
            <div id="chart-kospi" class="chart-container">
                <!-- TradingView Widget BEGIN -->
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "KRX:KOSPI",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(41, 98, 255, 1)",
                    "underLineColor": "rgba(41, 98, 255, 0.3)",
                    "underLineBottomColor": "rgba(41, 98, 255, 0)",
                    "isTransparent": true,
                    "autosize": true,
                    "largeChartUrl": ""
                    }
                    </script>
                </div>
                <!-- TradingView Widget END -->
            </div>
        </div>

        <!-- 2. S&P 500 Futures -->
        <div class="chart-card">
            <h2 class="chart-title">S&P 500 FUTURES (미국 선물)</h2>
            <div id="chart-sp500" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "CME_MINI:ES1!",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(255, 152, 0, 1)",
                    "underLineColor": "rgba(255, 152, 0, 0.3)",
                    "underLineBottomColor": "rgba(255, 152, 0, 0)",
                    "isTransparent": true,
                    "autosize": true
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 3. NASDAQ 100 Futures -->
        <div class="chart-card">
            <h2 class="chart-title">NASDAQ 100 FUTURES (나스닥)</h2>
            <div id="chart-nasdaq" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "CME_MINI:NQ1!",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(0, 188, 212, 1)",
                    "underLineColor": "rgba(0, 188, 212, 0.3)",
                    "underLineBottomColor": "rgba(0, 188, 212, 0)",
                    "isTransparent": true,
                    "autosize": true
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 4. Eurex KOSPI 200 (야간 선물) -->
        <div class="chart-card">
            <h2 class="chart-title">KOSPI 200 NIGHT (야간 선물)</h2>
            <div id="chart-night" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "EUREX:K2I1!",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(156, 39, 176, 1)",
                    "underLineColor": "rgba(156, 39, 176, 0.3)",
                    "underLineBottomColor": "rgba(156, 39, 176, 0)",
                    "isTransparent": true,
                    "autosize": true
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 5. USD/KRW Exchange Rate -->
        <div class="chart-card">
            <h2 class="chart-title">USD / KRW (원/달러 환율)</h2>
            <div id="chart-fx" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "FX_IDC:USDKRW",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(76, 175, 80, 1)",
                    "underLineColor": "rgba(76, 175, 80, 0.3)",
                    "underLineBottomColor": "rgba(76, 175, 80, 0)",
                    "isTransparent": true,
                    "autosize": true
                    }
                    </script>
                </div>
            </div>
        </div>

        <!-- 6. US 10Y Yield -->
        <div class="chart-card">
            <h2 class="chart-title">US 10Y YIELD (미국채 10년)</h2>
            <div id="chart-yield" class="chart-container">
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                    {
                    "symbol": "TVC:US10Y",
                    "width": "100%",
                    "height": "100%",
                    "locale": "ko",
                    "dateRange": "1D",
                    "colorTheme": "dark",
                    "trendLineColor": "rgba(244, 67, 54, 1)",
                    "underLineColor": "rgba(244, 67, 54, 0.3)",
                    "underLineBottomColor": "rgba(244, 67, 54, 0)",
                    "isTransparent": true,
                    "autosize": true
                    }
                    </script>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>Charts powered by TradingView. Data may be delayed based on exchange regulations.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
