<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lotto - 로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1 class="title">PREMIUM LOTTO</h1>
        <p class="subtitle">오늘의 행운을 확인해보세요.</p>
    </header>

    <main class="generator-section">
        <div id="lotto-display" class="lotto-display">
            <!-- 추첨된 번호 공들이 여기에 추가됩니다. -->
            <div class="placeholder-text">행운의 버튼을 눌러주세요</div>
        </div>

        <div class="controls">
            <button id="generate-btn" class="main-btn">번호 추첨하기</button>
        </div>
    </main>

    <section class="history-section">
        <h2 class="section-title">최근 추첨 내역</h2>
        <div id="history-container" class="history-container">
            <!-- 과거 내역이 여기에 추가됩니다. -->
        </div>
    </section>

    <script type="module" src="main.js"></script>
</body>
</html>
