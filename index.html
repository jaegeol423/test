<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>바디 스트레칭 가이드</title>
  <!-- Pretendard Font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <header>
    <h1>바디 스트레칭 가이드</h1>
    <p class="subtitle">신체 부위를 클릭하여 필요한 스트레칭을 확인하세요</p>
  </header>

  <nav class="controls">
    <button class="filter-btn active" data-category="all">전체</button>
    <button class="filter-btn" data-category="neck">목</button>
    <button class="filter-btn" data-category="shoulder">어깨</button>
    <button class="filter-btn" data-category="back">등/허리</button>
    <button class="filter-btn" data-category="wrist">손목</button>
    <button class="filter-btn" data-category="leg">다리</button>
  </nav>

  <main class="grid" id="stretch-grid">
    <!-- 스트레칭 카드가 여기에 삽입됩니다 -->
  </main>

  <script defer src="/main.js"></script>
</body>
</html>
