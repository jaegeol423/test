<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARKET INSIGHT Pro - Personal Investment Platform</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="pastel-dark sidebar-open">
    <header class="header">
        <div class="header-left">
            <button id="news-toggle-btn" class="icon-btn" title="뉴스 피드 토글">📰 뉴스</button>
            <div class="logo-area">
                <h1 class="title">MARKET INSIGHT <span class="pro-badge">PRO</span></h1>
            </div>
        </div>
        <div class="header-controls">
            <div class="theme-toggle">
                <button id="theme-btn" title="테마 변경">🌙</button>
            </div>
            <div class="market-status">
                <span class="status-dot pulse"></span>
                <span id="market-time">LOADING...</span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside id="sidebar" class="sidebar news-sidebar">
            <div class="sidebar-header">
                <h2 class="sidebar-label">실시간 경제 뉴스</h2>
            </div>
            <div id="tradingview-news" class="news-container">
                <!-- TradingView News Widget -->
            </div>
        </aside>

        <main class="content-area container">
            <!-- SECTION 0: MY WATCHLIST -->
            <section id="watchlist-section" class="dashboard-section hidden">
                <h2 class="section-label">★ MY WATCHLIST</h2>
                <div id="watchlist-grid" class="dashboard-grid main-grid"></div>
            </section>

            <!-- SECTION 1: GLOBAL MARKET -->
            <section class="dashboard-section">
                <h2 class="section-label">GLOBAL MARKET</h2>
                <div class="dashboard-grid main-grid">
                    <div class="chart-card" data-symbol="AMEX:EWY" data-id="kospi">
                        <div class="card-header">
                            <h3 class="chart-title">KOSPI (한국)</h3>
                            <div class="card-actions">
                                <button class="fav-btn">★</button>
                                <div class="interval-selector">
                                    <button class="int-btn" data-int="60">1h</button>
                                    <button class="int-btn active" data-int="D">D</button>
                                    <button class="int-btn" data-int="W">W</button>
                                </div>
                            </div>
                        </div>
                        <div id="chart_kospi" class="chart-container"></div>
                    </div>
                    <div class="chart-card" data-symbol="AMEX:SPY" data-id="sp500">
                        <div class="card-header">
                            <h3 class="chart-title">S&P 500 (미국)</h3>
                            <div class="card-actions">
                                <button class="fav-btn">★</button>
                                <div class="interval-selector">
                                    <button class="int-btn" data-int="60">1h</button>
                                    <button class="int-btn active" data-int="D">D</button>
                                    <button class="int-btn" data-int="W">W</button>
                                </div>
                            </div>
                        </div>
                        <div id="chart_sp500" class="chart-container"></div>
                    </div>
                    <div class="chart-card" data-symbol="NASDAQ:QQQ" data-id="nasdaq">
                        <div class="card-header">
                            <h3 class="chart-title">NASDAQ 100</h3>
                            <div class="card-actions">
                                <button class="fav-btn">★</button>
                                <div class="interval-selector">
                                    <button class="int-btn" data-int="60">1h</button>
                                    <button class="int-btn active" data-int="D">D</button>
                                    <button class="int-btn" data-int="W">W</button>
                                </div>
                            </div>
                        </div>
                        <div id="chart_nasdaq" class="chart-container"></div>
                    </div>
                    <div class="chart-card" data-symbol="NASDAQ:SOXX" data-id="sox">
                        <div class="card-header">
                            <h3 class="chart-title">반도체 (SOX)</h3>
                            <div class="card-actions">
                                <button class="fav-btn">★</button>
                                <div class="interval-selector">
                                    <button class="int-btn" data-int="60">1h</button>
                                    <button class="int-btn active" data-int="D">D</button>
                                    <button class="int-btn" data-int="W">W</button>
                                </div>
                            </div>
                        </div>
                        <div id="chart_sox" class="chart-container"></div>
                    </div>
                </div>
            </section>

            <!-- SECTION 2: CORE ASSETS -->
            <section class="dashboard-section">
                <h2 class="section-label">SECTORS & CORE ASSETS</h2>
                <div class="dashboard-grid sub-grid">
                    <div class="chart-card mini" data-symbol="AMEX:LIT" data-id="lit">
                        <div class="card-header"><h3 class="chart-title">배터리</h3><button class="fav-btn">★</button></div>
                        <div id="chart_lit" class="chart-container small"></div>
                    </div>
                    <div class="chart-card mini" data-symbol="FX_IDC:USDKRW" data-id="fx">
                        <div class="card-header"><h3 class="chart-title">환율</h3><button class="fav-btn">★</button></div>
                        <div id="chart_fx" class="chart-container small"></div>
                    </div>
                    <div class="chart-card mini" data-symbol="TVC:GOLD" data-id="gold">
                        <div class="card-header"><h3 class="chart-title">GOLD</h3><button class="fav-btn">★</button></div>
                        <div id="chart_gold" class="chart-container small"></div>
                    </div>
                    <div class="chart-card mini" data-symbol="BINANCE:BTCUSDT" data-id="btc">
                        <div class="card-header"><h3 class="chart-title">비트코인</h3><button class="fav-btn">★</button></div>
                        <div id="chart_btc" class="chart-container small"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <footer class="footer">
        <p>Market Insight Pro © 2026. MZ Pastel Aesthetic. Powered by TradingView.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
