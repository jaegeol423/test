<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홀로그램 바디 스트레칭 가이드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link href='/style.css' rel='stylesheet'>
  <!-- Three.js CDN -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
      }
    }
  </script>
</head>
<body data-theme="dark">
  <div class="ui-container">
    <header>
      <h1 class="glitch-text" data-text="HOLOGRAPHIC BODY GUIDE">HOLOGRAPHIC BODY GUIDE</h1>
      <p class="subtitle">신체 부위를 클릭하여 스트레칭 방법을 확인하세요</p>
    </header>

    <div id="three-canvas-container"></div>

    <aside id="info-panel" class="hidden">
      <button id="close-panel" class="close-btn">×</button>
      <div id="stretch-content">
        <!-- 스트레칭 정보가 여기에 표시됩니다 -->
      </div>
    </aside>

    <div class="scanline"></div>
    <div class="noise"></div>
  </div>

  <button id="theme-toggle" class="theme-toggle" aria-label="테마 변경">🌙</button>

  <script type="module" src="/main.js"></script>
</body>
</html>
